<!DOCTYPE html>
<html>
    <head>
        <title>Calculator</title>
        <link rel="stylesheet" href="cal.css">
    </head>
    <body>
        <main>
            <section id="Userinput">
                <div>
                    <textarea name="Expression" id="maths" placeholder="Type Here" rows="8" cols="30"></textarea>
                    <br>
                </div>
            </section>

            <section id="Usermanual">
                
                <div id="row">
                    <button type="button" id="operator">AC</button>
                    <button type="button" id="operator">(</button>
                    <button type="button" id="operator">)</button>
                    <button type="button" id="operator">DEL</button>
                </div>

                <div id="row">
                    <button type="button" ">1</button>
                    <button type="button" >2</button>
                    <button type="button" >3</button>
                    <button type="button" id="operator">×</button>
                </div>

                <div id="row">
                    <button type="button" >4</button>
                    <button type="button">5</button>
                    <button type="button">6</button>
                    <button type="button" id="operator">-</button>
                </div>

                <div id="row">
                    <button type="button">7</button>
                    <button type="button">8</button>
                    <button type="button">9</button>
                    <button type="button" id="operator">+</button>
                </div>

                <div id="row">
                    <button type="button">.</button>
                    <button type="button">0</button>
                    <button type="button">=</button>
                    <button type="button" id="operator">÷</button>
                </div>
            </section>
        </main>
    </body>
    <script src="script.js"></script>
</html>
